# rua CI — fmt / clippy / build / test をまとめる。
# lua-conformance 所有。リファレンス本家 lua5.1 が無くても壊れない構成
# （golden_compare は rua 未実装時は自動スキップ、本家検証は --ignored で別ジョブ）。
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-test:
    name: build / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: build
        run: cargo build --workspace --all-targets

      - name: test
        run: cargo test --workspace

  # 本家 lua5.1 がある環境でのみ、コミット済み .expected の正しさを検証する。
  # 本家導入に失敗してもワークフロー全体は壊さない（continue-on-error）。
  reference-validation:
    name: validate .expected against lua5.1
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: install reference lua5.1
        run: sudo apt-get update && sudo apt-get install -y lua5.1

      - name: validate committed .expected
        run: cargo test -p rua-cli -- --ignored validate_expected_against_reference

  # cargo-fuzz による短時間ファジング・スモーク。nightly 依存のため別ジョブ・continue-on-error。
  fuzz-smoke:
    name: fuzz smoke (nightly)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2

      - name: install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: fuzz compile_only (30s)
        run: cargo +nightly fuzz run compile_only -- -max_total_time=30

      - name: fuzz compile_run (30s)
        run: cargo +nightly fuzz run compile_run -- -max_total_time=30

  # 公式 Lua 5.1 テストスイート（PUC-Rio）のパス率を追跡。ネット取得が必要なため
  # continue-on-error。取得失敗時はランナーが自動スキップ。RUA_SUITE_STRICT=1 で
  # クラッシュ（パニック/abort）検出時のみ失敗させる（機能未実装による fail はパス率として記録）。
  official-suite:
    name: official Lua 5.1 suite (pass rate)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: fetch official suite
        run: tests/lua-suite/fetch.sh

      - name: run suite and report pass rate
        env:
          RUA_SUITE_STRICT: "1"
        run: |
          set -o pipefail
          cargo test -p rua-cli --test official_suite -- --ignored --nocapture 2>&1 | tee suite_out.txt

      # パス率をログから拾って Actions のジョブサマリに出す（手書き表の代替）。
      - name: write pass rate to job summary
        if: always()
        run: |
          {
            echo "## 公式 Lua 5.1 テストスイート パス率"
            echo '```'
            grep -E "pass:|fail:|crash:|timeout:" suite_out.txt || echo "(集計行が見つかりません)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
